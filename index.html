<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Test Climatizzatori Portatili – Versione Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin: 20px; background: #f4f4f4; }
.container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
button { padding: 12px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; }
button:hover { background: #0056b3; }
.hidden { display: none; }
.question { margin-bottom: 20px; padding: 15px; background: #eef2f7; border-radius: 8px; }
.timer { font-size: 22px; font-weight: bold; color: #d9534f; }
</style>
</head>

<body>
<div class="container">

<div id="startScreen">
    <h2>Test Climatizzatori Portatili – Versione Premium</h2>

    <label>Nome:</label><br>
    <input type="text" id="nome"><br><br>

    <label>Cognome:</label><br>
    <input type="text" id="cognome"><br><br>

    <label>Punto Vendita:</label><br>
    <select id="pv">
        <option value="">Seleziona il punto vendita</option>
        <option value="Fano">Fano</option>
        <option value="Pesaro">Pesaro</option>
        <option value="Ancona">Ancona</option>
        <option value="Senigallia">Senigallia</option>
        <option value="Civitanova">Civitanova</option>
        <option value="Macerata">Macerata</option>
        <option value="Ascoli Piceno">Ascoli Piceno</option>
    </select>
    <br><br>

    <button onclick="startTest()">Inizia il Test</button>
</div>

<div id="testScreen" class="hidden">
    <div class="timer" id="timer">Tempo: 07:00</div>
    <div id="questions"></div>
    <button onclick="finishTest()">Consegna Test</button>
</div>

<div id="resultScreen" class="hidden">
    <h2>Risultato del Test</h2>
    <p id="summary"></p>
    <button onclick="sendEmail()">Invia risultato via email</button>
</div>

</div>

<script>
function generaCodice() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const blocco = () => Array.from({length: 4}, () => chars[Math.floor(Math.random()*chars.length)]).join("");
    return `${blocco()}-${blocco()}-${blocco()}`;
}

let codiceUnivoco = generaCodice();
let lastResult = {};

let domande = [
    { q: "Qual è il vantaggio principale dei portatili De’Longhi Pinguino con tecnologia Real Feel?", a: ["Gestione combinata temperatura/umidità", "Funzionamento senza tubo", "Compressore inverter", "Doppio compressore"], c: 0 },
    { q: "I climatizzatori portatili Beko utilizzano principalmente quale gas refrigerante?", a: ["R290", "R32", "R410A", "R600a"], c: 0 },
    { q: "I portatili Argo sono particolarmente apprezzati per:", a: ["Silenziosità elevata", "Funzionamento senza tubo", "Doppio compressore", "Tecnologia inverter"], c: 0 },
    { q: "Un climatizzatore portatile monoblocco necessita sempre di:", a: ["Tubo di scarico aria calda", "Foro da 150 mm", "Installazione fissa", "Scarico condensa esterno"], c: 0 },
    { q: "Il gas R290 garantisce:", a: ["Maggiore efficienza e basso impatto ambientale", "Rumorosità più alta", "Consumi maggiori", "Funzionamento senza tubo"], c: 0 },
    { q: "La tecnologia Real Feel di De’Longhi regola:", a: ["Temperatura e umidità insieme", "Solo temperatura", "Solo ventilazione", "Solo deumidificazione"], c: 0 },
    { q: "Qual è il principale limite dei portatili a tubo singolo?", a: ["Creano una leggera depressione nell’ambiente", "Non possono deumidificare", "Consumano più acqua", "Non funzionano con R290"], c: 0 },
    { q: "La rumorosità media di un portatile è:", a: ["60–65 dB", "30–35 dB", "80–90 dB", "45–50 dB"], c: 0 },
    { q: "I portatili Beko includono spesso:", a: ["Auto-evaporazione della condensa", "Doppio tubo", "Inverter", "Alimentazione 12V"], c: 0 },
    { q: "I portatili Argo della serie Slim sono progettati per:", a: ["Profondità ridotta", "Maggiore potenza", "Funzionamento senza tubo", "Installazione a parete"], c: 0 },
    { q: "Un portatile da 10.000 BTU è adatto a:", a: ["20–25 m²", "10 m²", "40 m²", "60 m²"], c: 0 },
    { q: "La funzione Dry serve a:", a: ["Deumidificare senza raffreddare", "Aumentare la potenza", "Ridurre il rumore", "Eliminare la condensa"], c: 0 },
    { q: "La tecnologia Silent di De’Longhi riduce la rumorosità di circa:", a: ["3 dB", "10 dB", "1 dB", "15 dB"], c: 0 },
    { q: "Un portatile con auto-evaporazione:", a: ["Scarica la condensa tramite il tubo caldo", "Non produce condensa", "Richiede serbatoio esterno", "Non può deumidificare"], c: 0 },
    { q: "La funzione Follow Me nei portatili Argo regola la temperatura:", a: ["In base al telecomando", "In base al tubo", "In base alla ventola", "In base al compressore"], c: 0 },
    { q: "Un portatile in classe A consuma mediamente:", a: ["900–1100 W", "200–300 W", "1500–2000 W", "3000 W"], c: 0 },
    { q: "I portatili Beko includono spesso:", a: ["Timer 24h", "Doppio compressore", "Inverter", "Batteria interna"], c: 0 },
    { q: "Un raffrescatore evaporativo (senza tubo):", a: ["Non è un climatizzatore", "Raffredda come un portatile", "Usa gas refrigerante", "Richiede scarico condensa"], c: 0 },
    { q: "I portatili De’Longhi utilizzano spesso filtri:", a: ["Anti-polvere lavabili", "HEPA", "A carboni attivi", "Magnetici"], c: 0 },
    { q: "Un tubo caldo non isolato correttamente:", a: ["Riduce l’efficienza del climatizzatore", "Aumenta la potenza", "Elimina la condensa", "Riduce la rumorosità"], c: 0 }
];

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

let timeLeft = 420;
let timerInterval;

function startTimer(){
    timerInterval = setInterval(()=>{
        timeLeft--;
        let m = String(Math.floor(timeLeft/60)).padStart(2,"0");
        let s = String(timeLeft%60).padStart(2,"0");
        timer.innerText = `Tempo: ${m}:${s}`;
        if(timeLeft<=0){ clearInterval(timerInterval); finishTest(); }
    },1000);
}

function startTest(){
    if(!nome.value || !cognome.value || !pv.value){ alert("Compila tutti i campi"); return; }

    startScreen.classList.add("hidden");
    testScreen.classList.remove("hidden");

    shuffle(domande);

    let html="";
    domande.forEach((d,i)=>{
        let risposte = d.a.map((r,idx)=>({text:r,index:idx}));
        shuffle(risposte);

        html += `<div class="question"><p><b>${i+1}. ${d.q}</b></p>`;
        risposte.forEach(r=>{
            html += `<label><input type="radio" name="q${i}" value="${r.index}">${r.text}</label><br>`;
        });
        html += `</div>`;
    });

    questions.innerHTML = html;
    startTimer();
}

function finishTest(){
    clearInterval(timerInterval);

    let corrette=0, sbagliate=0, nonRisposte=0;

    domande.forEach((d,i)=>{
        let sel = document.querySelector(`input[name="q${i}"]:checked`);
        if(!sel) nonRisposte++;
        else if(parseInt(sel.value)===d.c) corrette++;
        else sbagliate++;
    });

    let punteggio = corrette - sbagliate - nonRisposte;
    let percentuale = Math.round((corrette/domande.length)*100);

    lastResult = {punteggio,percentuale,corrette,sbagliate,nonRisposte};

    testScreen.classList.add("hidden");
    resultScreen.classList.remove("hidden");

    summary.innerHTML = `
        Codice: <b>${codiceUnivoco}</b><br>
        Punteggio: <b>${punteggio}</b><br>
        Percentuale: <b>${percentuale}%</b><br>
        Corrette: ${corrette}<br>
        Sbagliate: ${sbagliate}<br>
        Non risposte: ${nonRisposte}
    `;

    inviaASheet(punteggio,percentuale,corrette,sbagliate,nonRisposte);
}

function inviaASheet(punteggio,percentuale,corrette,sbagliate,nonRisposte){
    fetch("https://script.google.com/macros/s/AKfycbwujmKoImyZouQgzkSVbn7JLZsTeKeMwF405f6P1IuaS4KrFqQWsVW2e-cU2-fvjDipiw/exec",{
        method:"POST",
        mode:"no-cors",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            test:"clima_portatili",
            codice:codiceUnivoco,
            nome:nome.value,
            cognome:cognome.value,
            puntoVendita:pv.value,
            punteggio,
            percentuale,
            corrette,
            sbagliate,
            nonRisposte
        })
    });
}

function sendEmail(){
    let mail="d.pavoni@dml-italia.com";
    let subject="Risultato Test Climatizzatori Portatili";

    let body =
        "RISULTATO TEST CLIMATIZZATORI PORTATILI%0D%0A" +
        "-----------------------------------------%0D%0A" +
        "Codice univoco: "+codiceUnivoco+"%0D%0A" +
        "Nome: "+nome.value+"%0D%0A" +
        "Cognome: "+cognome.value+"%0D%0A" +
        "Punto vendita: "+pv.value+"%0D%0A%0D%0A" +
        "Punteggio: "+lastResult.punteggio+"%0D%0A" +
        "Percentuale: "+lastResult.percentuale+"%0D%0A" +
        "Corrette: "+lastResult.corrette+"%0D%0A" +
        "Sbagliate: "+lastResult.sbagliate+"%0D%0A" +
        "Non risposte: "+lastResult.nonRisposte+"%0D%0A";

    window.location.href=`mailto:${mail}?subject=${subject}&body=${body}`;
}
</script>

</body>
</html>
